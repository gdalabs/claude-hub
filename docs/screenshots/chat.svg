<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <style>
      text { font-family: -apple-system, 'SF Pro', 'Inter', sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', Consolas, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#0d1117" rx="8"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="960" height="44" fill="#161b22" rx="8"/>
  <rect x="0" y="36" width="960" height="8" fill="#161b22"/>
  <text x="16" y="28" fill="#58a6ff" font-size="14" font-weight="700" class="mono">claude-hub</text>

  <!-- Chat header -->
  <text x="300" y="72" fill="#c9d1d9" font-size="14" font-weight="600">Fix auth middleware</text>
  <text x="300" y="88" fill="#8b949e" font-size="11" class="mono">my-webapp · opus-4-6</text>

  <!-- Model selector -->
  <rect x="770" y="58" width="140" height="28" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="784" y="76" fill="#c9d1d9" font-size="11" class="mono">claude-opus-4-6</text>
  <text x="896" y="76" fill="#484f58" font-size="10">▼</text>

  <!-- Chat messages -->
  <!-- User message 1 -->
  <rect x="280" y="110" width="400" height="50" fill="#1a2233" rx="8"/>
  <text x="296" y="132" fill="#58a6ff" font-size="10" font-weight="600">You</text>
  <text x="296" y="148" fill="#c9d1d9" font-size="12">The JWT middleware isn't validating expired tokens</text>
  <text x="296" y="148" fill="#c9d1d9" font-size="12">correctly. Can you fix it?</text>

  <!-- Assistant message 1 -->
  <rect x="280" y="172" width="400" height="140" fill="#161b22" rx="8"/>
  <text x="296" y="194" fill="#3fb950" font-size="10" font-weight="600">Claude</text>
  <text x="296" y="214" fill="#c9d1d9" font-size="12">I'll fix the JWT validation. The issue is in</text>
  <text x="296" y="230" fill="#c9d1d9" font-size="12">middleware/auth.ts — the expiry check uses</text>
  <text x="296" y="246" fill="#c9d1d9" font-size="12">seconds instead of milliseconds.</text>

  <!-- Code block inside assistant -->
  <rect x="296" y="258" width="368" height="42" fill="#0d1117" rx="4" stroke="#30363d" stroke-width="1"/>
  <text x="308" y="274" fill="#ff7b72" font-size="10" class="mono">- if (decoded.exp &lt; Date.now())</text>
  <text x="308" y="290" fill="#3fb950" font-size="10" class="mono">+ if (decoded.exp &lt; Date.now() / 1000)</text>

  <!-- User message 2 -->
  <rect x="280" y="324" width="400" height="50" fill="#1a2233" rx="8"/>
  <text x="296" y="346" fill="#58a6ff" font-size="10" font-weight="600">You</text>
  <text x="296" y="362" fill="#c9d1d9" font-size="12">Also add a test for this edge case</text>

  <!-- Assistant message 2 (streaming indicator) -->
  <rect x="280" y="386" width="400" height="60" fill="#161b22" rx="8" stroke="#238636" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="296" y="408" fill="#3fb950" font-size="10" font-weight="600">Claude</text>
  <text x="296" y="428" fill="#c9d1d9" font-size="12">I'll create a test that verifies expired tokens are</text>
  <text x="296" y="436" fill="#3fb950" font-size="12" class="mono">▍</text>

  <!-- Input bar -->
  <rect x="280" y="470" width="400" height="44" fill="#0d1117" rx="8" stroke="#30363d" stroke-width="1"/>
  <text x="296" y="496" fill="#484f58" font-size="12">Message Claude...</text>

  <!-- Input buttons -->
  <rect x="614" y="478" width="28" height="28" rx="6" fill="#21262d"/>
  <text x="622" y="496" fill="#8b949e" font-size="12">📎</text>
  <rect x="646" y="478" width="28" height="28" rx="6" fill="#238636"/>
  <text x="654" y="496" fill="#fff" font-size="12">↑</text>
</svg>
